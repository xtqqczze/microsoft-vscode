version: 1
rounds:
  - clientToServer:
      - channel: ${chat_0}
        action:
          type: chat/turnStarted
          turnId: ${turn_0}
          message:
            text: Read nested/value.txt and reply with its exact contents only.
            origin:
              kind: user
    serverToClient:
      - channel: ${session_0}
        action:
          type: session/chatUpdated
      - channel: ${chat_0}
        action:
          type: chat/turnStarted
          turnId: ${turn_0}
          message:
            text: Read nested/value.txt and reply with its exact contents only.
            origin:
              kind: user
      - channel: ${session_0}
        action:
          type: session/titleChanged
      - channel: ${session_0}
        action:
          type: session/serverToolsChanged
      - method: root/sessionAdded
      - channel: ${session_0}
        action:
          type: session/ready
      - channel: ${session_0}
        action:
          type: session/changesetsChanged
      - channel: ${chat_0}
        action:
          type: chat/responsePart
          turnId: ${turn_0}
          part:
            kind: markdown
            content: I’m reading `nested/value.txt` now and will return its contents exactly with no extra text.I’m reading `nested/value.txt` now and will return its contents exactly with no extra text.
      - channel: ${chat_0}
        action:
          type: chat/toolCallStart
          turnId: ${turn_0}
          toolCallId: ${toolCall_0}
          toolName: shell
          displayName: Run shell command
      - channel: ${chat_0}
        action:
          type: chat/toolCallDelta
      - channel: ${chat_0}
        action:
          type: chat/toolCallReady
          turnId: ${turn_0}
          toolCallId: ${toolCall_0}
          invocationMessage: cat nested/value.txt
          toolInput: cat nested/value.txt
          confirmed: not-needed
      - channel: ${chat_0}
        action:
          type: chat/toolCallComplete
          turnId: ${turn_0}
          toolCallId: ${toolCall_0}
          result:
            success: true
            pastTenseMessage: Ran `cat nested/value.txt`
            content:
              - type: text
                text: NESTED_VALUE_42
      - channel: ${chat_0}
        action:
          type: chat/usage
          turnId: ${turn_0}
      - channel: ${chat_0}
        action:
          type: chat/responsePart
          turnId: ${turn_0}
          part:
            kind: markdown
            content: NESTED_VALUE_42NESTED_VALUE_42
      - channel: ${chat_0}
        action:
          type: chat/usage
          turnId: ${turn_0}
      - channel: ${session_0}
        action:
          type: session/chatUpdated
      - channel: ${chat_0}
        action:
          type: chat/turnComplete
          turnId: ${turn_0}
