version: 1
dialect: anthropic
exchanges:
  - request:
      model: claude-opus-4.6
      system: ${system}
      messages:
        - role: user
          content: |-
            Read the attached Python file. What function names are defined in it? Reply with only the function names.

            <tagged_files>
            * ${workdir}/ahp-attachment-test-tR6Qfs/calculator.py (2 lines)
            </tagged_files>
    response:
      content:
        - type: tool_use
          id: toolcall_0
          name: report_intent
          input:
            intent: Reading attached file
        - type: tool_use
          id: toolcall_1
          name: view
          input:
            path: ${workdir}/ahp-attachment-test-tR6Qfs/calculator.py
      stopReason: tool_use
      usage:
        inputTokens: 3
        outputTokens: 136
  - request:
      model: claude-opus-4.6
      system: ${system}
      messages:
        - role: user
          content: |-
            Read the attached Python file. What function names are defined in it? Reply with only the function names.

            <tagged_files>
            * ${workdir}/ahp-attachment-test-tR6Qfs/calculator.py (2 lines)
            </tagged_files>
        - role: assistant
          content:
            - type: tool_use
              name: report_intent
              input:
                intent: Reading attached file
            - type: tool_use
              name: view
              input:
                path: ${workdir}/ahp-attachment-test-tR6Qfs/calculator.py
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolcall_0
              content: Intent logged
            - type: tool_result
              tool_use_id: toolcall_1
              content: "1. def add(a, b):\n2. \treturn a + b"
    response:
      content: '`add`'
      stopReason: end_turn
      usage:
        inputTokens: 1
        outputTokens: 6
