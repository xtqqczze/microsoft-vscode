version: 1
dialect: anthropic
exchanges:
  - request:
      model: claude-opus-4.8
      system: ${system}
      messages:
        - role: user
          content: Create result.txt containing exactly CREATED_VALUE.
    response:
      content:
        - type: text
          text: I'll create that file for you.
        - type: tool_use
          id: toolcall_0
          name: Write
          input:
            file_path: ${workdir}/ahp-coverage-create-${temp}/result.txt
            content: CREATED_VALUE
      stopReason: tool_use
  - request:
      model: claude-opus-4.8
      system: ${system}
      messages:
        - role: user
          content: Create result.txt containing exactly CREATED_VALUE.
        - role: assistant
          content:
            - type: text
              text: I'll create that file for you.
            - type: tool_use
              name: Write
              input:
                file_path: ${workdir}/ahp-coverage-create-${temp}/result.txt
                content: CREATED_VALUE
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolcall_0
              content: 'File created successfully at: ${workdir}/ahp-coverage-create-${temp}/result.txt (file state is current in your context — no need to Read it back)'
    response:
      content: Created `result.txt` containing exactly `CREATED_VALUE`.
      stopReason: end_turn
