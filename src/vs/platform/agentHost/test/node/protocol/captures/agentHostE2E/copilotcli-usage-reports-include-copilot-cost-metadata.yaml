version: 1
dialect: anthropic
exchanges:
  - request:
      model: claude-opus-4.6
      system: ${system}
      messages:
        - role: user
          content: Reply with exactly "usage-ok" and do not use tools.
    response:
      content: usage-ok
      stopReason: end_turn
      usage:
        inputTokens: 3
        outputTokens: 6
