version: 1
dialect: anthropic
exchanges:
  - request:
      model: claude-opus-4.8
      system: ${system}
      messages:
        - role: user
          content: Replace the complete contents of ${workdir}/peer-edit.txt with AFTER_PEER.
    response:
      content:
        - type: text
          text: I'll replace the file contents.
        - type: tool_use
          id: toolcall_0
          name: Bash
          input:
            command: test -f ${workdir}/peer-edit.txt && echo EXISTS || echo MISSING
            description: Check if target file exists
      stopReason: tool_use
  - request:
      model: claude-opus-4.8
      system: ${system}
      messages:
        - role: user
          content: Replace the complete contents of ${workdir}/peer-edit.txt with AFTER_PEER.
        - role: assistant
          content:
            - type: text
              text: I'll replace the file contents.
            - type: tool_use
              name: Bash
              input:
                command: test -f ${workdir}/peer-edit.txt && echo EXISTS || echo MISSING
                description: Check if target file exists
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolcall_0
              content: EXISTS
    response:
      content:
        - type: tool_use
          id: toolcall_1
          name: Read
          input:
            file_path: ${workdir}/peer-edit.txt
      stopReason: tool_use
  - request:
      model: claude-opus-4.8
      system: ${system}
      messages:
        - role: user
          content: Replace the complete contents of ${workdir}/peer-edit.txt with AFTER_PEER.
        - role: assistant
          content:
            - type: text
              text: I'll replace the file contents.
            - type: tool_use
              name: Bash
              input:
                command: test -f ${workdir}/peer-edit.txt && echo EXISTS || echo MISSING
                description: Check if target file exists
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolcall_0
              content: EXISTS
        - role: assistant
          content:
            - type: tool_use
              name: Read
              input:
                file_path: ${workdir}/peer-edit.txt
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolcall_1
              content: "1\tBEFORE_PEER"
    response:
      content:
        - type: tool_use
          id: toolcall_2
          name: Write
          input:
            file_path: ${workdir}/peer-edit.txt
            content: AFTER_PEER
      stopReason: tool_use
  - request:
      model: claude-opus-4.8
      system: ${system}
      messages:
        - role: user
          content: Replace the complete contents of ${workdir}/peer-edit.txt with AFTER_PEER.
        - role: assistant
          content:
            - type: text
              text: I'll replace the file contents.
            - type: tool_use
              name: Bash
              input:
                command: test -f ${workdir}/peer-edit.txt && echo EXISTS || echo MISSING
                description: Check if target file exists
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolcall_0
              content: EXISTS
        - role: assistant
          content:
            - type: tool_use
              name: Read
              input:
                file_path: ${workdir}/peer-edit.txt
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolcall_1
              content: "1\tBEFORE_PEER"
        - role: assistant
          content:
            - type: tool_use
              name: Write
              input:
                file_path: ${workdir}/peer-edit.txt
                content: AFTER_PEER
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolcall_2
              content: The file ${workdir}/peer-edit.txt has been updated successfully. (file state is current in your context — no need to Read it back)
    response:
      content: Done. Replaced the contents of `peer-edit.txt` (was `BEFORE_PEER`) with `AFTER_PEER`.
      stopReason: end_turn
