version: 1
dialect: anthropic
exchanges:
  - request:
      model: claude-sonnet-5
      system: ${system}
      messages:
        - role: user
          content: Run a shell command that prints SHELL_VALUE_73, then reply with that exact value only.
    response:
      content:
        - type: tool_use
          id: toolcall_0
          name: bash
          input:
            command: echo SHELL_VALUE_73
            description: Print SHELL_VALUE_73
      stopReason: tool_use
  - request:
      model: claude-sonnet-5
      system: ${system}
      messages:
        - role: user
          content: Run a shell command that prints SHELL_VALUE_73, then reply with that exact value only.
        - role: assistant
          content:
            - type: tool_use
              name: bash
              input:
                command: echo SHELL_VALUE_73
                description: Print SHELL_VALUE_73
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolcall_0
              content: |-
                SHELL_VALUE_73
                <shellId: 0 completed with exit code 0>
    response:
      content: SHELL_VALUE_73
      stopReason: end_turn
