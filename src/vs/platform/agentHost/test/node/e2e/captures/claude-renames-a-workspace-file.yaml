version: 1
dialect: anthropic
exchanges:
  - request:
      model: claude-opus-4.8
      system: ${system}
      messages:
        - role: user
          content: Rename before.txt to after.txt without changing its contents.
    response:
      content:
        - type: tool_use
          id: toolcall_0
          name: Bash
          input:
            command: mv before.txt after.txt && ls -la after.txt
            description: Rename before.txt to after.txt
      stopReason: tool_use
  - request:
      model: claude-opus-4.8
      system: ${system}
      messages:
        - role: user
          content: Rename before.txt to after.txt without changing its contents.
        - role: assistant
          content:
            - type: thinking
            - type: tool_use
              name: Bash
              input:
                command: mv before.txt after.txt && ls -la after.txt
                description: Rename before.txt to after.txt
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolcall_0
              content: '-rw-r--r--@ 1 ${user}  staff  12 ${timestamp} after.txt'
    response:
      content: Done. `before.txt` is now `after.txt` with its contents unchanged.
      stopReason: end_turn
