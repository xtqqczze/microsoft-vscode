version: 1
dialect: anthropic
exchanges:
  - request:
      model: claude-sonnet-5
      system: ${system}
      messages:
        - role: user
          content: Read "file with spaces.txt" and reply with its exact contents only.
    response:
      content:
        - type: tool_use
          id: toolcall_0
          name: glob
          input:
            pattern: '**/file with spaces.txt'
      stopReason: tool_use
  - request:
      model: claude-sonnet-5
      system: ${system}
      messages:
        - role: user
          content: Read "file with spaces.txt" and reply with its exact contents only.
        - role: assistant
          content:
            - type: thinking
            - type: tool_use
              name: glob
              input:
                pattern: '**/file with spaces.txt'
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolcall_0
              content: ./file with spaces.txt
    response:
      content:
        - type: tool_use
          id: toolcall_1
          name: view
          input:
            path: ${workdir}/ahp-coverage-spaces-${temp}/file with spaces.txt
      stopReason: tool_use
  - request:
      model: claude-sonnet-5
      system: ${system}
      messages:
        - role: user
          content: Read "file with spaces.txt" and reply with its exact contents only.
        - role: assistant
          content:
            - type: thinking
            - type: tool_use
              name: glob
              input:
                pattern: '**/file with spaces.txt'
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolcall_0
              content: ./file with spaces.txt
        - role: assistant
          content:
            - type: tool_use
              name: view
              input:
                path: ${workdir}/ahp-coverage-spaces-${temp}/file with spaces.txt
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolcall_1
              content: 1. SPACED_VALUE
    response:
      content: SPACED_VALUE
      stopReason: end_turn
