version: 1
dialect: anthropic
exchanges:
  - request:
      model: claude-sonnet-5
      system: ${system}
      messages:
        - role: user
          content: Remember the code word RESUME_PEER. Reply exactly "ready".
    response:
      content: ready
      stopReason: end_turn
  - request:
      model: claude-sonnet-5
      system: ${system}
      messages:
        - role: user
          content: Remember the code word RESUME_PEER. Reply exactly "ready".
        - role: assistant
          content: ready
        - role: user
          content: Reply exactly "resumed".
    response:
      content: resumed
      stopReason: end_turn
