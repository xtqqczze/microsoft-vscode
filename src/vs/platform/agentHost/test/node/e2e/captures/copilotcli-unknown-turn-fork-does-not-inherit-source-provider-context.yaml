version: 1
dialect: anthropic
exchanges:
  - request:
      model: claude-sonnet-5
      system: ${system}
      messages:
        - role: user
          content: Remember the code word SOURCE_SECRET. Reply exactly "ready".
    response:
      content: ready
      stopReason: end_turn
  - request:
      model: claude-sonnet-5
      system: ${system}
      messages:
        - role: user
          content: Reply exactly "fresh".
    response:
      content: fresh
      stopReason: end_turn
