version: 1
dialect: anthropic
exchanges:
  - request:
      model: claude-sonnet-5
      system: ${system}
      messages:
        - role: user
          content: Inspect git status. Reply with the names of the modified and untracked files only.
    response:
      content:
        - type: tool_use
          id: toolcall_0
          name: bash
          input:
            command: git status --porcelain
            description: Check git status
      stopReason: tool_use
  - request:
      model: claude-sonnet-5
      system: ${system}
      messages:
        - role: user
          content: Inspect git status. Reply with the names of the modified and untracked files only.
        - role: assistant
          content:
            - type: tool_use
              name: bash
              input:
                command: git status --porcelain
                description: Check git status
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolcall_0
              content: |-
                M tracked.txt
                ?? untracked.txt
                <shellId: 0 completed with exit code 0>
    response:
      content: tracked.txt, untracked.txt
      stopReason: end_turn
