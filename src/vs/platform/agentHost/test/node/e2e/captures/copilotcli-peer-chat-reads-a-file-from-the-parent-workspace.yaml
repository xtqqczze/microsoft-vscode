version: 1
dialect: anthropic
exchanges:
  - request:
      model: claude-sonnet-5
      system: ${system}
      messages:
        - role: user
          content: Read the file at ${workdir}/peer-note.txt and reply with its exact contents only.
    response:
      content:
        - type: tool_use
          id: toolcall_0
          name: view
          input:
            path: ${workdir}/peer-note.txt
      stopReason: tool_use
  - request:
      model: claude-sonnet-5
      system: ${system}
      messages:
        - role: user
          content: Read the file at ${workdir}/peer-note.txt and reply with its exact contents only.
        - role: assistant
          content:
            - type: tool_use
              name: view
              input:
                path: ${workdir}/peer-note.txt
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolcall_0
              content: 1. PEER_FILE_VALUE
    response:
      content: PEER_FILE_VALUE
      stopReason: end_turn
