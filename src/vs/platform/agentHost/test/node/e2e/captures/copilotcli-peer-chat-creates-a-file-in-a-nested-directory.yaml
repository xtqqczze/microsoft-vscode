                description: Create peer-output directory
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolcall_0
              content: '<shellId: 0 completed with exit code 0>'
    response:
      content:
        - type: tool_use
          id: toolcall_1
          name: create
          input:
            path: ${workdir}/peer-output/report.txt
            file_text: PEER_NESTED
