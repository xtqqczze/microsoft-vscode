  - request:
      model: claude-sonnet-5
      system: ${system}
      messages:
        - role: user
          content: Create the file at ${workdir}/peer-output/report.txt containing exactly PEER_NESTED.
        - role: assistant
          content:
            - type: thinking
            - type: tool_use
