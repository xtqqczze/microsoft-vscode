      model: claude-sonnet-5
      system: ${system}
      messages:
        - role: user
          content: Create the file at ${workdir}/peer-output/report.txt containing exactly PEER_NESTED.
    response:
      content:
        - type: tool_use
          id: toolcall_0
          name: bash
          input:
            command: mkdir -p ${workdir}/peer-output
            description: Create peer-output directory
      stopReason: tool_use
  - request:
      model: claude-sonnet-5
      system: ${system}
