version: 1
dialect: anthropic
exchanges:
  - request:
      model: claude-opus-4.8
      system: ${system}
      messages:
        - role: user
          content: List the files in the current working directory. Reply with the filenames only.
    response:
      content:
        - type: text
          text: I'll list the files in the working directory.
        - type: tool_use
          id: toolcall_0
          name: Bash
          input:
            command: ls -1
            description: List files in current directory
      stopReason: tool_use
  - request:
      model: claude-opus-4.8
      system: ${system}
      messages:
        - role: user
          content: List the files in the current working directory. Reply with the filenames only.
        - role: assistant
          content:
            - type: text
              text: I'll list the files in the working directory.
            - type: tool_use
              name: Bash
              input:
                command: ls -1
                description: List files in current directory
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolcall_0
              content: |-
                first.txt
                second.md
    response:
      content: |-
        first.txt
        second.md
      stopReason: end_turn
