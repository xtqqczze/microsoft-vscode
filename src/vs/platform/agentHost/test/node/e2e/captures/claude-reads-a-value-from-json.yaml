version: 1
dialect: anthropic
exchanges:
  - request:
      model: claude-opus-4.8
      system: ${system}
      messages:
        - role: user
          content: Read config.json and reply with the numeric value of "answer" only.
    response:
      content:
        - type: tool_use
          id: toolcall_0
          name: Read
          input:
            file_path: ${workdir}/ahp-coverage-json-${temp}/config.json
      stopReason: tool_use
  - request:
      model: claude-opus-4.8
      system: ${system}
      messages:
        - role: user
          content: Read config.json and reply with the numeric value of "answer" only.
        - role: assistant
          content:
            - type: thinking
            - type: tool_use
              name: Read
              input:
                file_path: ${workdir}/ahp-coverage-json-${temp}/config.json
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolcall_0
              content: "1\t{\"answer\":42}"
    response:
      content: '42'
      stopReason: end_turn
