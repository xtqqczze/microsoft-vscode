version: 1
rounds:
  - clientToServer:
      - channel: ${chat_0}
        action:
          type: chat/turnStarted
          turnId: ${turn_0}
          message:
            text: Inspect git status. Reply with the names of the modified and untracked files only.
            origin:
              kind: user
    serverToClient:
      - channel: ${chat_0}
        action:
          type: chat/turnStarted
          turnId: ${turn_0}
          message:
            text: Inspect git status. Reply with the names of the modified and untracked files only.
            origin:
              kind: user
      - channel: ${session_0}
        action:
          type: session/titleChanged
      - method: root/sessionAdded
      - channel: ${session_0}
        action:
          type: session/ready
      - channel: ${session_0}
        action:
          type: session/metaChanged
      - channel: ${chat_0}
        action:
          type: chat/toolCallStart
          turnId: ${turn_0}
          toolCallId: ${toolCall_0}
          toolName: bash
      - channel: ${chat_0}
        action:
          type: chat/toolCallComplete
          turnId: ${turn_0}
          toolCallId: ${toolCall_0}
          result:
            success: true
      - channel: ${chat_0}
        action:
          type: chat/responsePart
          turnId: ${turn_0}
          part:
            kind: markdown
            content: tracked.txt, untracked.txt
      - channel: ${chat_0}
        action:
          type: chat/turnComplete
          turnId: ${turn_0}
