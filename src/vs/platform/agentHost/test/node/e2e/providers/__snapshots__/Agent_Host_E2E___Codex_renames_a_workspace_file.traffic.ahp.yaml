version: 1
rounds:
  - clientToServer:
      - channel: ${chat_0}
        action:
          type: chat/turnStarted
          turnId: ${turn_0}
          message:
            text: Rename before.txt to after.txt without changing its contents.
            origin:
              kind: user
    serverToClient:
      - channel: ${session_0}
        action:
          type: session/chatUpdated
      - channel: ${chat_0}
        action:
          type: chat/turnStarted
          turnId: ${turn_0}
          message:
            text: Rename before.txt to after.txt without changing its contents.
            origin:
              kind: user
      - channel: ${session_0}
        action:
          type: session/titleChanged
      - channel: ${session_0}
        action:
          type: session/serverToolsChanged
      - method: root/sessionAdded
      - channel: ${session_0}
        action:
          type: session/ready
      - channel: ${session_0}
        action:
          type: session/changesetsChanged
      - channel: ${chat_0}
        action:
          type: chat/responsePart
          turnId: ${turn_0}
          part:
            kind: markdown
            content: I’ll rename `before.txt` to `after.txt` in place and keep the file contents unchanged. I’m doing that now.I’ll rename `before.txt` to `after.txt` in place and keep the file contents unchanged. I’m doing that now.
      - channel: ${chat_0}
        action:
          type: chat/toolCallStart
          turnId: ${turn_0}
          toolCallId: ${toolCall_0}
          toolName: shell
          displayName: Run shell command
      - channel: ${chat_0}
        action:
          type: chat/toolCallDelta
      - channel: ${chat_0}
        action:
          type: chat/toolCallReady
          turnId: ${turn_0}
          toolCallId: ${toolCall_0}
          invocationMessage: mv before.txt after.txt
          toolInput: mv before.txt after.txt
          confirmed: not-needed
      - channel: ${chat_0}
        action:
          type: chat/usage
          turnId: ${turn_0}
      - channel: ${chat_0}
        action:
          type: chat/toolCallComplete
          turnId: ${turn_0}
          toolCallId: ${toolCall_0}
          result:
            success: true
            pastTenseMessage: Ran `mv before.txt after.txt`
      - channel: ${chat_0}
        action:
          type: chat/responsePart
          turnId: ${turn_0}
          part:
            kind: markdown
            content: Renamed `before.txt` to `after.txt` with contents unchanged.Renamed `before.txt` to `after.txt` with contents unchanged.
      - channel: ${chat_0}
        action:
          type: chat/usage
          turnId: ${turn_0}
      - channel: ${session_0}
        action:
          type: session/chatUpdated
      - channel: ${chat_0}
        action:
          type: chat/turnComplete
          turnId: ${turn_0}
