version: 1
rounds:
  - clientToServer:
      - channel: ${chat_0}
        action:
          type: chat/turnStarted
          turnId: ${turn_0}
          message:
            text: Create result.txt containing exactly CREATED_VALUE.
            origin:
              kind: user
      - channel: ${chat_0}
        action:
          type: chat/toolCallConfirmed
          turnId: ${turn_0}
          toolCallId: ${toolCall_0}
          approved: true
          confirmed: user-action
    serverToClient:
      - channel: ${session_0}
        action:
          type: session/chatUpdated
      - channel: ${chat_0}
        action:
          type: chat/turnStarted
          turnId: ${turn_0}
          message:
            text: Create result.txt containing exactly CREATED_VALUE.
            origin:
              kind: user
      - channel: ${session_0}
        action:
          type: session/titleChanged
      - channel: ${session_0}
        action:
          type: session/serverToolsChanged
      - method: root/sessionAdded
      - channel: ${session_0}
        action:
          type: session/ready
      - channel: ${session_0}
        action:
          type: session/changesetsChanged
      - channel: ${chat_0}
        action:
          type: chat/usage
          turnId: ${turn_0}
      - channel: ${chat_0}
        action:
          type: chat/toolCallStart
          turnId: ${turn_0}
          toolCallId: ${toolCall_0}
          toolName: create
          displayName: Create File
      - channel: ${chat_0}
        action:
          type: chat/toolCallReady
          turnId: ${turn_0}
          toolCallId: ${toolCall_0}
          invocationMessage: Creating [result.txt](file://${workdir}/result.txt)
          toolInput: |-
            {
              "path": "${workdir}/result.txt",
              "file_text": "CREATED_VALUE"
            }
          confirmed: not-needed
      - channel: ${chat_0}
        action:
          type: chat/usage
          turnId: ${turn_0}
      - channel: ${session_0}
        action:
          type: session/chatUpdated
      - channel: ${chat_0}
        action:
          type: chat/toolCallReady
          turnId: ${turn_0}
          toolCallId: ${toolCall_0}
          invocationMessage: Creating [result.txt](file://${workdir}/result.txt)
          toolInput: '{"path":"${workdir}/result.txt"}'
      - channel: ${session_0}
        action:
          type: session/inputNeededSet
      - channel: ${session_0}
        action:
          type: session/chatUpdated
      - channel: ${chat_0}
        action:
          type: chat/toolCallConfirmed
          turnId: ${turn_0}
          toolCallId: ${toolCall_0}
          approved: true
          confirmed: user-action
      - channel: ${session_0}
        action:
          type: session/inputNeededRemoved
      - channel: ${chat_0}
        action:
          type: chat/responsePart
          turnId: ${turn_0}
          part:
            kind: markdown
            content: Created result.txt with the exact content `CREATED_VALUE`.
      - channel: ${chat_0}
        action:
          type: chat/usage
          turnId: ${turn_0}
      - channel: ${chat_0}
        action:
          type: chat/usage
          turnId: ${turn_0}
      - channel: ${session_0}
        action:
          type: session/chatUpdated
      - channel: ${chat_0}
        action:
          type: chat/turnComplete
          turnId: ${turn_0}
