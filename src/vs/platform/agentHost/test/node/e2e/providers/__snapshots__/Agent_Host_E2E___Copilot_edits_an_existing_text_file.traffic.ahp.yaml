version: 1
rounds:
  - clientToServer:
      - channel: ${chat_0}
        action:
          type: chat/turnStarted
          turnId: ${turn_0}
          message:
            text: Replace the complete contents of edit.txt with AFTER_VALUE.
            origin:
              kind: user
      - channel: ${chat_0}
        action:
          type: chat/toolCallConfirmed
          turnId: ${turn_0}
          toolCallId: ${toolCall_7}
          approved: true
          confirmed: user-action
    serverToClient:
      - channel: ${session_0}
        action:
          type: session/chatUpdated
      - channel: ${chat_0}
        action:
          type: chat/turnStarted
          turnId: ${turn_0}
          message:
            text: Replace the complete contents of edit.txt with AFTER_VALUE.
            origin:
              kind: user
      - channel: ${session_0}
        action:
          type: session/titleChanged
      - channel: ${session_0}
        action:
          type: session/serverToolsChanged
      - method: root/sessionAdded
      - channel: ${session_0}
        action:
          type: session/ready
      - channel: ${session_0}
        action:
          type: session/changesetsChanged
      - channel: ${chat_0}
        action:
          type: chat/usage
          turnId: ${turn_0}
      - channel: ${chat_0}
        action:
          type: chat/toolCallStart
          turnId: ${turn_0}
          toolCallId: ${toolCall_0}
          toolName: bash
          displayName: Run Shell Command
      - channel: ${chat_0}
        action:
          type: chat/toolCallReady
          turnId: ${turn_0}
          toolCallId: ${toolCall_0}
          invocationMessage: Running `find / -maxdepth 6 -iname "edit.txt" 2>/dev/null`
          toolInput: find / -maxdepth 6 -iname "edit.txt" 2>/dev/null
          confirmed: not-needed
      - channel: ${chat_0}
        action:
          type: chat/usage
          turnId: ${turn_0}
      - channel: ${chat_0}
        action:
          type: chat/toolCallReady
          turnId: ${turn_0}
          toolCallId: ${toolCall_0}
          invocationMessage: Locate edit.txt file
          toolInput: find / -maxdepth 6 -iname "edit.txt" 2>/dev/null
          confirmed: not-needed
      - channel: ${chat_0}
        action:
          type: chat/toolCallComplete
          turnId: ${turn_0}
          toolCallId: ${toolCall_0}
          result:
            success: true
            pastTenseMessage: Ran `find / -maxdepth 6 -iname "edit.txt" 2>/dev/null`
            content:
              - type: text
                text: |-

                  <shellId: ${shellId} completed with exit code 1>
      - channel: ${chat_0}
        action:
          type: chat/usage
          turnId: ${turn_0}
      - channel: ${chat_0}
        action:
          type: chat/toolCallStart
          turnId: ${turn_0}
          toolCallId: ${toolCall_1}
          toolName: bash
          displayName: Run Shell Command
      - channel: ${chat_0}
        action:
          type: chat/toolCallReady
          turnId: ${turn_0}
          toolCallId: ${toolCall_1}
          invocationMessage: Running `find / -iname "edit.txt" 2>/dev/null`
          toolInput: find / -iname "edit.txt" 2>/dev/null
          confirmed: not-needed
      - channel: ${chat_0}
        action:
          type: chat/usage
          turnId: ${turn_0}
      - channel: ${chat_0}
        action:
          type: chat/toolCallReady
          turnId: ${turn_0}
          toolCallId: ${toolCall_1}
          invocationMessage: Locate edit.txt file anywhere
          toolInput: find / -iname "edit.txt" 2>/dev/null
          confirmed: not-needed
      - channel: ${chat_0}
        action:
          type: chat/toolCallComplete
          turnId: ${turn_0}
          toolCallId: ${toolCall_1}
          result:
            success: true
            pastTenseMessage: Ran `find / -iname "edit.txt" 2>/dev/null`
            content:
