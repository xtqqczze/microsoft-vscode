version: 1
rounds:
  - clientToServer:
      - channel: ${chat_0}
        action:
          type: chat/turnStarted
          turnId: ${turn_0}
          message:
            text: /rename
            origin:
              kind: user
    serverToClient:
      - channel: ${chat_0}
        action:
          type: chat/turnStarted
          turnId: ${turn_0}
          message:
            text: /rename
            origin:
              kind: user
      - channel: ${chat_0}
        action:
          type: chat/turnComplete
          turnId: ${turn_0}
